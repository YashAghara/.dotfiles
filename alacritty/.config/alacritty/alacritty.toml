[general]
import = [
  "~/.config/alacritty/rose-pine.toml"
]

[env]
TERM = "xterm-256color"

[window]
padding.x = 16
padding.y = 14
decorations = "None"
startup_mode = "Maximized"

[terminal.shell]
program = "tmux"

[font]
size = 14.0

[font.bold]
# family = "FiraCode Nerd Font"
# family = "MesloLGS Nerd Font Mono"
# family = "Iosevka NF"
# family = "JetBrainsMono NF"
family = "0xProto Nerd Font"
style = "Bold"

[font.bold_italic]
# family = "FiraCode Nerd Font"
# family = "MesloLGS Nerd Font Mono"
# family = "Iosevka NF"
# family = "JetBrainsMono NF"
family = "0xProto Nerd Font"
style = "Bold Italic"

[font.italic]
# family = "FiraCode Nerd Font"
# family = "MesloLGS Nerd Font Mono"
# family = "Iosevka NF"
# family = "JetBrainsMono NF"
family = "0xProto Nerd Font"
style = "Italic"

[font.normal]
# family = "FiraCode Nerd Font"
# family = "MesloLGS Nerd Font Mono"
# family = "Iosevka NF"
# family = "JetBrainsMono NF"
family = "0xProto Nerd Font"
style = "Regular"

[keyboard]
bindings = [
{ key = "F11", action = "ToggleFullscreen" }
]

[terminal]


